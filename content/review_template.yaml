# review_template.yaml — эталонные поля отзыва

fields:
  context:
    description: "Кто пишет, в каком качестве работали с Сергеем"
    example: "Проходил курс по AI-автоматизации в январе 2025"
    required: true

  moment:
    description: "Конкретный момент, результат или что изменилось"
    example: "После курса внедрил автоматизацию отчётов, экономлю 5 часов в неделю"
    required: true

  style:
    description: "Как Сергей работает, чем отличается от других"
    example: "Объясняет сложное без воды, сразу на примерах"
    required: true

  recommendation:
    description: "Кому и для чего рекомендует"
    example: "Рекомендую всем кто хочет разобраться с AI без лишней теории"
    required: false  # если нет — генерируем сами