# Банк уточняющих вопросов
# Используется: после analyze_answer, если enough = false
#
# Логика выбора:
#   — берём поля где false (moment, style, context)
#   — для каждого missing поля берём один вопрос рандомно
#   — задаём максимум 2 вопроса суммарно
#   — приоритет: moment > style > context
#
# Принимаем ответ: текст или голосовое


# MOMENT — конкретный результат или запоминающийся момент
# Самое важное поле. Если его нет — всегда спрашиваем.

moment:
  - "⚡ Был ли такой момент, когда Сергей реально повлиял — решение, идея, разворот? Что это было?"
  - "⚡ Что конкретно изменилось после работы с Сергеем — в проекте, в голове, в том как работается?"
  - "⚡ Что из того что делали вместе запомнилось больше всего — и почему именно это?"


# STYLE — как Сергей работает, чем отличается
# Второй приоритет. Делает отзыв живым, а не общим.

style:
  - "💬 А как бы описать Сергея как специалиста — не «хорошо», а как именно? Что в нём специфического?"
  - "💬 А чем по твоему мнению Сергей выделяется среди тех, с кем приходилось работать?"
  - "💬 А если рекомендовать Сергея другу — что сказать про него как про человека, не только как про специалиста?"


# CONTEXT — кто пишет, в каком качестве работали
# Третий приоритет. Обычно понятно из Шага 1, но бывают исключения.

context:
  - "📌 Расскажи чуть подробнее — над чем конкретно работали вместе или что за курс был?"
  - "📌 Уточни контекст — это был разовый проект, постоянная работа или что-то другое?"
